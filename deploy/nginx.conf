# 玄成接单系统 · Nginx 站点配置
# 放到 /etc/nginx/conf.d/xuancheng.conf，改好 server_name 与 root 后 reload

server {
    listen 80;
    server_name your-domain.com;   # 改成你的域名或服务器公网IP

    # 允许大附件（图片/视频/压缩包走 base64，放宽请求体）
    client_max_body_size 50m;

    # 前端静态文件（把 dist/ 里的内容上传到这个目录）
    root /var/www/xuancheng;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端接口反向代理到若依（本机 8080）
    location /jiedan/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /login {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # 如后续启用若依文件上传(OSS/本地)，再放开：
    # location /common/ { proxy_pass http://127.0.0.1:8080; }
}
