name: Deploy backend

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/kejijava
  SERVICE_NAME: kejijava
  JAR_NAME: ruoyi-admin.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Prepare backend patch
        run: |
          set -euo pipefail
          rm -rf backend-patch backend-patch.tar.gz
          mkdir -p backend-patch/BOOT-INF/classes/com/ruoyi
          mkdir -p backend-patch/BOOT-INF/classes/mapper
          cp -R ruoyi-admin/target/classes/com/ruoyi/jiedan backend-patch/BOOT-INF/classes/com/ruoyi/
          cp -R ruoyi-admin/target/classes/mapper/jiedan backend-patch/BOOT-INF/classes/mapper/
          tar -czf backend-patch.tar.gz -C backend-patch .
          ls -lh backend-patch.tar.gz

      - name: Upload patch
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: backend-patch.tar.gz
          target: /tmp/backend-deploy
          overwrite: true

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          JAR_NAME: ${{ env.JAR_NAME }}
          APP_DB_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_DIR,SERVICE_NAME,JAR_NAME,APP_DB_PASSWORD
          command_timeout: 5m
          script: |
            set -e

            configure_java() {
              for candidate in /usr/lib/jvm/*17* /usr/lib/jvm/*11*; do
                if [ -x "$candidate/bin/java" ]; then
                  export JAVA_HOME="$candidate"
                  export PATH="$JAVA_HOME/bin:$PATH"
                  break
                fi
              done
              JAVA_BIN="$(command -v java)"
            }

            configure_java
            mkdir -p "$APP_DIR"
            test -s "$APP_DIR/$JAR_NAME"
            test -s "/tmp/backend-deploy/backend-patch.tar.gz"

            run_schema_sql() {
              if MYSQL_PWD="$APP_DB_PASSWORD" mysql -h127.0.0.1 -P3306 -uxc_app -D xc_jiedan -e "select 1" >/dev/null 2>&1; then
                MYSQL_PWD="$APP_DB_PASSWORD" mysql -h127.0.0.1 -P3306 -uxc_app -D xc_jiedan
                return
              fi
              if MYSQL_PWD="$APP_DB_PASSWORD" mysql -uroot -D xc_jiedan -e "select 1" >/dev/null 2>&1; then
                MYSQL_PWD="$APP_DB_PASSWORD" mysql -uroot -D xc_jiedan
                return
              fi
              if MYSQL_PWD=123456 mysql -uroot -D xc_jiedan -e "select 1" >/dev/null 2>&1; then
                MYSQL_PWD=123456 mysql -uroot -D xc_jiedan
                return
              fi
              if mysql -uroot -D xc_jiedan -e "select 1" >/dev/null 2>&1; then
                mysql -uroot -D xc_jiedan
                return
              fi
              echo "unable to connect to xc_jiedan database" >&2
              return 1
            }

            run_schema_sql <<'SQL'
            SET @db = DATABASE();

            SET @sql = IF(
              (SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS
               WHERE TABLE_SCHEMA = @db AND TABLE_NAME = 'jiedan_order' AND COLUMN_NAME = 'customer_account') = 0,
              'ALTER TABLE jiedan_order ADD COLUMN customer_account VARCHAR(64) CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci DEFAULT '''' AFTER customer',
              'SELECT 1'
            );
            PREPARE stmt FROM @sql;
            EXECUTE stmt;
            DEALLOCATE PREPARE stmt;

            ALTER TABLE jiedan_order
              MODIFY customer_account VARCHAR(64) CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci DEFAULT '';

            SET @sql = IF(
              (SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS
               WHERE TABLE_SCHEMA = @db AND TABLE_NAME = 'jiedan_order' AND COLUMN_NAME = 'notes') = 0,
              'ALTER TABLE jiedan_order ADD COLUMN notes LONGTEXT NULL AFTER attachments',
              'SELECT 1'
            );
            PREPARE stmt FROM @sql;
            EXECUTE stmt;
            DEALLOCATE PREPARE stmt;

            SET @sql = IF(
              (SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS
               WHERE TABLE_SCHEMA = @db AND TABLE_NAME = 'jiedan_order' AND COLUMN_NAME = 'note_attachments') = 0,
              'ALTER TABLE jiedan_order ADD COLUMN note_attachments LONGTEXT NULL AFTER notes',
              'SELECT 1'
            );
            PREPARE stmt FROM @sql;
            EXECUTE stmt;
            DEALLOCATE PREPARE stmt;

            INSERT IGNORE INTO sys_user
              (user_id, dept_id, user_name, nick_name, user_type, email, phonenumber, sex, avatar, password,
               status, del_flag, login_ip, login_date, create_by, create_time, update_by, update_time, remark)
            VALUES
              (2, 101, 'customer', '客户账号', '2', 'customer@example.com', '', '2', '',
               '$2a$10$BNYaFwOidOKPaUdXALy8hugrW2cxuB5tYp2J8sE1K.d10fnzUHgsK',
               '0', '0', '', NULL, 'admin', NOW(), '', NULL, '默认客户账号'),
              (101, 100, 'laowang', '老王餐饮', '2', '', '', '2', '',
               '$2a$10$BNYaFwOidOKPaUdXALy8hugrW2cxuB5tYp2J8sE1K.d10fnzUHgsK',
               '0', '0', '', NULL, 'admin', NOW(), '', NULL, '演示客户账号'),
              (102, 100, 'hailan', '海蓝科技', '2', '', '', '2', '',
               '$2a$10$BNYaFwOidOKPaUdXALy8hugrW2cxuB5tYp2J8sE1K.d10fnzUHgsK',
               '0', '0', '', NULL, 'admin', NOW(), '', NULL, '演示客户账号');

            INSERT IGNORE INTO sys_user_role (user_id, role_id) VALUES (2, 2), (101, 2), (102, 2);
            INSERT IGNORE INTO sys_user_role (user_id, role_id)
              SELECT user_id, 2 FROM sys_user WHERE user_name IN ('customer', 'laowang', 'hailan');

            DELETE ur FROM sys_user_role ur
              JOIN sys_user u ON u.user_id = ur.user_id
              WHERE (u.user_name = 'customer' AND u.user_id <> 2)
                 OR (u.user_name = 'laowang' AND u.user_id <> 101)
                 OR (u.user_name = 'hailan' AND u.user_id <> 102);
            DELETE FROM sys_user
              WHERE (user_name = 'customer' AND user_id <> 2)
                 OR (user_name = 'laowang' AND user_id <> 101)
                 OR (user_name = 'hailan' AND user_id <> 102);

            UPDATE sys_user
              SET nick_name = CASE user_name
                    WHEN 'customer' THEN CONVERT(0xE5AEA2E688B7E8B4A6E58FB7 USING utf8mb4)
                    WHEN 'laowang' THEN CONVERT(0xE88081E78E8BE9A490E9A5AE USING utf8mb4)
                    WHEN 'hailan' THEN CONVERT(0xE6B5B7E8939DE7A791E68A80 USING utf8mb4)
                  END,
                  password = '$2a$10$BNYaFwOidOKPaUdXALy8hugrW2cxuB5tYp2J8sE1K.d10fnzUHgsK',
                  status = '0',
                  del_flag = '0'
              WHERE user_name IN ('customer', 'laowang', 'hailan');

            UPDATE jiedan_order
              SET customer_account = 'laowang'
              WHERE id = 1 AND (customer_account IS NULL OR customer_account = '');
            UPDATE jiedan_order
              SET customer_account = 'hailan'
              WHERE id = 2 AND (customer_account IS NULL OR customer_account = '');
            SQL
            echo "database schema migration ok"

            cp "$APP_DIR/$JAR_NAME" "$APP_DIR/$JAR_NAME.bak"
            PATCH_DIR="$(mktemp -d)"
            tar -xzf /tmp/backend-deploy/backend-patch.tar.gz -C "$PATCH_DIR"
            python3 - "$APP_DIR/$JAR_NAME" "$PATCH_DIR" <<'PY'
            import os
            import sys
            import zipfile

            jar_path, patch_dir = sys.argv[1:3]
            tmp_path = jar_path + '.patched'
            patch_files = {}

            for root, _, files in os.walk(patch_dir):
                for name in files:
                    path = os.path.join(root, name)
                    entry = os.path.relpath(path, patch_dir).replace(os.sep, '/')
                    patch_files[entry] = path

            if not patch_files:
                raise SystemExit('backend patch is empty')

            with zipfile.ZipFile(jar_path, 'r') as zin, zipfile.ZipFile(tmp_path, 'w', compression=zipfile.ZIP_DEFLATED) as zout:
                for item in zin.infolist():
                    if item.filename in patch_files:
                        continue
                    zout.writestr(item, zin.read(item.filename))
                for entry, path in sorted(patch_files.items()):
                    zout.write(path, entry)

            os.replace(tmp_path, jar_path)
            print(f'patched {len(patch_files)} backend entries')
            PY
            rm -rf /tmp/backend-deploy "$PATCH_DIR"

            TEMPLATE_PID="$(ps -eo pid=,args= | awk '/[j]ava/ && /\/opt\/xuancheng\/ruoyi-admin\.jar/ { print $1; exit }')"
            EXTRA_ARGS_SCRIPT=""
            if [ -n "$TEMPLATE_PID" ] && [ -r "/proc/$TEMPLATE_PID/cmdline" ]; then
              EXTRA_ARGS_SCRIPT="$(python3 - "$TEMPLATE_PID" <<'PY'
            import shlex
            import sys

            pid = sys.argv[1]
            with open(f'/proc/{pid}/cmdline', 'rb') as fh:
                args = [part.decode('utf-8', 'ignore') for part in fh.read().split(b'\0') if part]

            prefixes = ('--spring.', '--ruoyi.profile=')
            for arg in args:
                if arg.startswith('--server.port='):
                    continue
                if arg.startswith(prefixes):
                    print(f'EXTRA_ARGS+=({shlex.quote(arg)})')
            PY
              )"
            fi
            EXTRA_ARGS_SCRIPT="$EXTRA_ARGS_SCRIPT
            EXTRA_ARGS+=(--spring.datasource.druid.master.url=jdbc:mysql://127.0.0.1:3306/xc_jiedan?useUnicode=true\\&characterEncoding=utf8\\&zeroDateTimeBehavior=convertToNull\\&useSSL=false\\&serverTimezone=GMT%2B8)
            EXTRA_ARGS+=(--spring.datasource.druid.master.username=xc_app)
            EXTRA_ARGS+=(--spring.datasource.druid.master.password=$(printf '%q' "$APP_DB_PASSWORD"))"
            echo "reused datasource args: $(printf '%s\n' "$EXTRA_ARGS_SCRIPT" | grep -c '^EXTRA_ARGS+=' || true)"

            cat > "$APP_DIR/start.sh" <<SCRIPT
            #!/usr/bin/env bash
            set -e
            EXTRA_ARGS=()
            $EXTRA_ARGS_SCRIPT
            exec "$JAVA_BIN" -Djava.awt.headless=true -jar "$APP_DIR/$JAR_NAME" --server.port=8091 "\${EXTRA_ARGS[@]}"
            SCRIPT
            chmod +x "$APP_DIR/start.sh"

            cat > "/etc/systemd/system/$SERVICE_NAME.service" <<SERVICE
            [Unit]
            Description=Xuancheng Order Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=$APP_DIR/start.sh
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            sleep 15
            systemctl is-active --quiet "$SERVICE_NAME"
            journalctl -u "$SERVICE_NAME" -n 80 --no-pager
