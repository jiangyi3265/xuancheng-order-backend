name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/kejijava
  REPO_URL: https://github.com/jiangyi3265/xuancheng-order-backend.git
  SERVICE_NAME: kejijava
  JAR_NAME: ruoyi-admin.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
          REPO_URL: ${{ env.REPO_URL }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          JAR_NAME: ${{ env.JAR_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_DIR,REPO_URL,SERVICE_NAME,JAR_NAME
          command_timeout: 30m
          script: |
            set -e

            install_packages() {
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y git maven openjdk-17-jdk
              elif command -v yum >/dev/null 2>&1; then
                yum install -y git maven java-17-openjdk-devel || yum install -y git maven java-11-openjdk-devel
              else
                echo "unsupported package manager; install git, maven, and Java 11+ manually"
                exit 1
              fi
            }

            configure_java() {
              for candidate in /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/java-17-openjdk /usr/lib/jvm/java-11-openjdk-amd64 /usr/lib/jvm/java-11-openjdk; do
                if [ -x "$candidate/bin/java" ]; then
                  export JAVA_HOME="$candidate"
                  export PATH="$JAVA_HOME/bin:$PATH"
                  break
                fi
              done
              JAVA_BIN="$(command -v java)"
            }

            if ! command -v git >/dev/null 2>&1 || ! command -v mvn >/dev/null 2>&1 || ! command -v java >/dev/null 2>&1; then
              install_packages
            fi
            configure_java
            JAVA_MAJOR="$(java -version 2>&1 | awk -F[\".] '/version/ { print $2 == "1" ? $3 : $2 }')"
            if [ "$JAVA_MAJOR" -lt 11 ]; then
              install_packages
              configure_java
              JAVA_MAJOR="$(java -version 2>&1 | awk -F[\".] '/version/ { print $2 == "1" ? $3 : $2 }')"
            fi
            if [ "$JAVA_MAJOR" -lt 11 ]; then
              echo "Java 11 or newer is required on the server"
              java -version
              exit 1
            fi

            SRC_DIR="$APP_DIR/source"
            mkdir -p "$APP_DIR"
            if [ -d "$SRC_DIR/.git" ]; then
              git -C "$SRC_DIR" fetch --prune origin main
              git -C "$SRC_DIR" reset --hard origin/main
            else
              rm -rf "$SRC_DIR"
              git clone --branch main "$REPO_URL" "$SRC_DIR"
            fi

            cd "$SRC_DIR"
            mvn -B clean package -DskipTests

            if [ -f "$APP_DIR/$JAR_NAME" ]; then
              cp "$APP_DIR/$JAR_NAME" "$APP_DIR/$JAR_NAME.bak"
            fi
            cp "ruoyi-admin/target/$JAR_NAME" "$APP_DIR/$JAR_NAME"

            cat > "/etc/systemd/system/$SERVICE_NAME.service" <<SERVICE
            [Unit]
            Description=Xuancheng Order Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=$JAVA_BIN -jar $APP_DIR/$JAR_NAME
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            sleep 5
            systemctl is-active --quiet "$SERVICE_NAME"
            journalctl -u "$SERVICE_NAME" -n 80 --no-pager
