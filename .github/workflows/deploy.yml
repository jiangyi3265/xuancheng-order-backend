name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/kejijava
  SERVICE_NAME: kejijava
  JAR_NAME: ruoyi-admin.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: ruoyi-admin/target/ruoyi-admin.jar
          target: /tmp/backend-deploy
          strip_components: 2
          overwrite: true

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          JAR_NAME: ${{ env.JAR_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_DIR,SERVICE_NAME,JAR_NAME
          command_timeout: 5m
          script: |
            set -e

            configure_java() {
              for candidate in /usr/lib/jvm/*17* /usr/lib/jvm/*11*; do
                if [ -x "$candidate/bin/java" ]; then
                  export JAVA_HOME="$candidate"
                  export PATH="$JAVA_HOME/bin:$PATH"
                  break
                fi
              done
              JAVA_BIN="$(command -v java)"
            }

            configure_java
            mkdir -p "$APP_DIR"
            test -s "/tmp/backend-deploy/$JAR_NAME"

            if [ -f "$APP_DIR/$JAR_NAME" ]; then
              cp "$APP_DIR/$JAR_NAME" "$APP_DIR/$JAR_NAME.bak"
            fi
            mv "/tmp/backend-deploy/$JAR_NAME" "$APP_DIR/$JAR_NAME"
            rm -rf /tmp/backend-deploy

            TEMPLATE_PID="$(pgrep -f '/opt/xuancheng/ruoyi-admin.jar' | head -n 1 || true)"
            EXTRA_ARGS_SCRIPT=""
            if [ -n "$TEMPLATE_PID" ] && [ -r "/proc/$TEMPLATE_PID/cmdline" ]; then
              EXTRA_ARGS_SCRIPT="$(python3 - "$TEMPLATE_PID" <<'PY'
            import shlex
            import sys

            pid = sys.argv[1]
            with open(f'/proc/{pid}/cmdline', 'rb') as fh:
                args = [part.decode('utf-8', 'ignore') for part in fh.read().split(b'\0') if part]

            prefixes = ('--spring.', '--ruoyi.profile=')
            for arg in args:
                if arg.startswith('--server.port='):
                    continue
                if arg.startswith(prefixes):
                    print(f'EXTRA_ARGS+=({shlex.quote(arg)})')
            PY
              )"
            fi

            cat > "$APP_DIR/start.sh" <<SCRIPT
            #!/usr/bin/env bash
            set -e
            EXTRA_ARGS=()
            $EXTRA_ARGS_SCRIPT
            exec "$JAVA_BIN" -Djava.awt.headless=true -jar "$APP_DIR/$JAR_NAME" --server.port=8091 "\${EXTRA_ARGS[@]}"
            SCRIPT
            chmod +x "$APP_DIR/start.sh"

            cat > "/etc/systemd/system/$SERVICE_NAME.service" <<SERVICE
            [Unit]
            Description=Xuancheng Order Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=$APP_DIR/start.sh
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            sleep 15
            systemctl is-active --quiet "$SERVICE_NAME"
            journalctl -u "$SERVICE_NAME" -n 80 --no-pager
