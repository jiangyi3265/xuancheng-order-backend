name: Deploy backend

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/kejijava
  SERVICE_NAME: kejijava
  JAR_NAME: ruoyi-admin.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Prepare backend patch
        run: |
          set -euo pipefail
          rm -rf backend-patch backend-patch.tar.gz
          mkdir -p backend-patch/BOOT-INF/classes/com/ruoyi
          mkdir -p backend-patch/BOOT-INF/classes/mapper
          cp -R ruoyi-admin/target/classes/com/ruoyi/jiedan backend-patch/BOOT-INF/classes/com/ruoyi/
          cp -R ruoyi-admin/target/classes/mapper/jiedan backend-patch/BOOT-INF/classes/mapper/
          tar -czf backend-patch.tar.gz -C backend-patch .
          ls -lh backend-patch.tar.gz

      - name: Upload patch
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: backend-patch.tar.gz
          target: /tmp/backend-deploy
          overwrite: true

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          JAR_NAME: ${{ env.JAR_NAME }}
          APP_DB_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_DIR,SERVICE_NAME,JAR_NAME,APP_DB_PASSWORD
          command_timeout: 5m
          script: |
            set -e

            configure_java() {
              for candidate in /usr/lib/jvm/*17* /usr/lib/jvm/*11*; do
                if [ -x "$candidate/bin/java" ]; then
                  export JAVA_HOME="$candidate"
                  export PATH="$JAVA_HOME/bin:$PATH"
                  break
                fi
              done
              JAVA_BIN="$(command -v java)"
            }

            configure_java
            mkdir -p "$APP_DIR"
            test -s "$APP_DIR/$JAR_NAME"
            test -s "/tmp/backend-deploy/backend-patch.tar.gz"

            cp "$APP_DIR/$JAR_NAME" "$APP_DIR/$JAR_NAME.bak"
            PATCH_DIR="$(mktemp -d)"
            tar -xzf /tmp/backend-deploy/backend-patch.tar.gz -C "$PATCH_DIR"
            python3 - "$APP_DIR/$JAR_NAME" "$PATCH_DIR" <<'PY'
            import os
            import sys
            import zipfile

            jar_path, patch_dir = sys.argv[1:3]
            tmp_path = jar_path + '.patched'
            patch_files = {}

            for root, _, files in os.walk(patch_dir):
                for name in files:
                    path = os.path.join(root, name)
                    entry = os.path.relpath(path, patch_dir).replace(os.sep, '/')
                    patch_files[entry] = path

            if not patch_files:
                raise SystemExit('backend patch is empty')

            with zipfile.ZipFile(jar_path, 'r') as zin, zipfile.ZipFile(tmp_path, 'w', compression=zipfile.ZIP_DEFLATED) as zout:
                for item in zin.infolist():
                    if item.filename in patch_files:
                        continue
                    zout.writestr(item, zin.read(item.filename))
                for entry, path in sorted(patch_files.items()):
                    zout.write(path, entry)

            os.replace(tmp_path, jar_path)
            print(f'patched {len(patch_files)} backend entries')
            PY
            rm -rf /tmp/backend-deploy "$PATCH_DIR"

            TEMPLATE_PID="$(ps -eo pid=,args= | awk '/[j]ava/ && /\/opt\/xuancheng\/ruoyi-admin\.jar/ { print $1; exit }')"
            EXTRA_ARGS_SCRIPT=""
            if [ -n "$TEMPLATE_PID" ] && [ -r "/proc/$TEMPLATE_PID/cmdline" ]; then
              EXTRA_ARGS_SCRIPT="$(python3 - "$TEMPLATE_PID" <<'PY'
            import shlex
            import sys

            pid = sys.argv[1]
            with open(f'/proc/{pid}/cmdline', 'rb') as fh:
                args = [part.decode('utf-8', 'ignore') for part in fh.read().split(b'\0') if part]

            prefixes = ('--spring.', '--ruoyi.profile=')
            for arg in args:
                if arg.startswith('--server.port='):
                    continue
                if arg.startswith(prefixes):
                    print(f'EXTRA_ARGS+=({shlex.quote(arg)})')
            PY
              )"
            fi
            EXTRA_ARGS_SCRIPT="$EXTRA_ARGS_SCRIPT
            EXTRA_ARGS+=(--spring.datasource.druid.master.url=jdbc:mysql://127.0.0.1:3306/xc_jiedan?useUnicode=true\\&characterEncoding=utf8\\&zeroDateTimeBehavior=convertToNull\\&useSSL=false\\&serverTimezone=GMT%2B8)
            EXTRA_ARGS+=(--spring.datasource.druid.master.username=xc_app)
            EXTRA_ARGS+=(--spring.datasource.druid.master.password=$(printf '%q' "$APP_DB_PASSWORD"))"
            echo "reused datasource args: $(printf '%s\n' "$EXTRA_ARGS_SCRIPT" | grep -c '^EXTRA_ARGS+=' || true)"

            cat > "$APP_DIR/start.sh" <<SCRIPT
            #!/usr/bin/env bash
            set -e
            EXTRA_ARGS=()
            $EXTRA_ARGS_SCRIPT
            exec "$JAVA_BIN" -Djava.awt.headless=true -jar "$APP_DIR/$JAR_NAME" --server.port=8091 "\${EXTRA_ARGS[@]}"
            SCRIPT
            chmod +x "$APP_DIR/start.sh"

            cat > "/etc/systemd/system/$SERVICE_NAME.service" <<SERVICE
            [Unit]
            Description=Xuancheng Order Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=$APP_DIR/start.sh
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            sleep 15
            systemctl is-active --quiet "$SERVICE_NAME"
            journalctl -u "$SERVICE_NAME" -n 80 --no-pager
