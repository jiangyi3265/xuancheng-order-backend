name: Diagnose server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 2m
          script: |
            set -e
            echo "== service =="
            systemctl --no-pager --full status kejijava || true
            systemctl --no-pager cat kejijava || true
            echo "== java processes =="
            ps -ef | grep '[j]ava' || true
            echo "== listeners =="
            ss -ltnp | grep -E ':80|:8080|:8081|:8091' || true
            echo "== jar files =="
            ls -lh /www/wwwroot/kejijava || true
            sha256sum /www/wwwroot/kejijava/ruoyi-admin.jar || true
            python3 - <<'PY'
            import io
            import zipfile

            app = '/www/wwwroot/kejijava/ruoyi-admin.jar'
            with zipfile.ZipFile(app, 'r') as outer:
                captcha = outer.read('BOOT-INF/classes/com/ruoyi/web/controller/common/CaptchaController.class')
                framework = outer.read('BOOT-INF/lib/ruoyi-framework-3.9.1.jar')
                system = outer.read('BOOT-INF/lib/ruoyi-system-3.9.1.jar')
                print('captcha class mentions selectCaptchaEnabled:', b'selectCaptchaEnabled' in captcha)
                for name in ['BOOT-INF/lib/ruoyi-framework-3.9.1.jar', 'BOOT-INF/lib/ruoyi-system-3.9.1.jar']:
                    info = outer.getinfo(name)
                    print(name, 'compress_type=', info.compress_type, 'size=', info.file_size)
            with zipfile.ZipFile(io.BytesIO(framework), 'r') as fw:
                login = fw.read('com/ruoyi/framework/web/service/SysLoginService.class')
                print('login class mentions selectCaptchaEnabled:', b'selectCaptchaEnabled' in login)
            with zipfile.ZipFile(io.BytesIO(system), 'r') as sy:
                config = sy.read('com/ruoyi/system/service/impl/SysConfigServiceImpl.class')
                print('config class mentions sys.account.captchaEnabled:', b'sys.account.captchaEnabled' in config)
            PY
            echo "== local curl =="
            curl -sS --max-time 20 http://127.0.0.1:8091/captchaImage || true
