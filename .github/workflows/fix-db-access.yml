name: Fix DB access

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Create app database user
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DB_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_DB_PASSWORD
          command_timeout: 5m
          script: |
            set -e

            run_sql() {
              mysql "$@" <<SQL
            CREATE DATABASE IF NOT EXISTS xc_jiedan DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
            CREATE USER IF NOT EXISTS 'xc_app'@'localhost' IDENTIFIED BY '${APP_DB_PASSWORD}';
            CREATE USER IF NOT EXISTS 'xc_app'@'127.0.0.1' IDENTIFIED BY '${APP_DB_PASSWORD}';
            ALTER USER 'xc_app'@'localhost' IDENTIFIED BY '${APP_DB_PASSWORD}';
            ALTER USER 'xc_app'@'127.0.0.1' IDENTIFIED BY '${APP_DB_PASSWORD}';
            GRANT ALL PRIVILEGES ON xc_jiedan.* TO 'xc_app'@'localhost';
            GRANT ALL PRIVILEGES ON xc_jiedan.* TO 'xc_app'@'127.0.0.1';
            FLUSH PRIVILEGES;
            SQL
            }

            if mysql -uroot -e "select 1" >/dev/null 2>&1; then
              run_sql -uroot
            elif MYSQL_PWD=123456 mysql -uroot -e "select 1" >/dev/null 2>&1; then
              MYSQL_PWD=123456 run_sql -uroot
            elif MYSQL_PWD="$APP_DB_PASSWORD" mysql -uroot -e "select 1" >/dev/null 2>&1; then
              MYSQL_PWD="$APP_DB_PASSWORD" run_sql -uroot
            else
              MYSQL_SERVICE="$(systemctl list-unit-files | awk '/^(mysqld|mysql|mariadb)\.service/ { print $1; exit }')"
              [ -n "$MYSQL_SERVICE" ] || MYSQL_SERVICE=mysqld.service
              systemctl stop "$MYSQL_SERVICE" || true
              nohup mysqld_safe --skip-grant-tables --skip-networking >/tmp/xc-mysqld-safe.log 2>&1 &
              for i in $(seq 1 30); do
                mysql -uroot -e "select 1" >/dev/null 2>&1 && break
                sleep 2
              done
              mysql -uroot <<SQL
            FLUSH PRIVILEGES;
            CREATE DATABASE IF NOT EXISTS xc_jiedan DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
            CREATE USER IF NOT EXISTS 'xc_app'@'localhost' IDENTIFIED BY '${APP_DB_PASSWORD}';
            CREATE USER IF NOT EXISTS 'xc_app'@'127.0.0.1' IDENTIFIED BY '${APP_DB_PASSWORD}';
            ALTER USER 'xc_app'@'localhost' IDENTIFIED BY '${APP_DB_PASSWORD}';
            ALTER USER 'xc_app'@'127.0.0.1' IDENTIFIED BY '${APP_DB_PASSWORD}';
            GRANT ALL PRIVILEGES ON xc_jiedan.* TO 'xc_app'@'localhost';
            GRANT ALL PRIVILEGES ON xc_jiedan.* TO 'xc_app'@'127.0.0.1';
            FLUSH PRIVILEGES;
            SQL
              mysqladmin -uroot shutdown || true
              systemctl start "$MYSQL_SERVICE"
            fi

            systemctl restart mysqld || systemctl restart mysql || systemctl restart mariadb || true
            sleep 5
            MYSQL_PWD="$APP_DB_PASSWORD" mysql -uxc_app -D xc_jiedan -e "select 1" >/dev/null
            MYSQL_PWD="$APP_DB_PASSWORD" mysql -h127.0.0.1 -P3306 -uxc_app -D xc_jiedan -e "select 1" >/dev/null
            echo "xc_app database access ok"
