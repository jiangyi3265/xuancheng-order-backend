name: Fix server runtime

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Install font runtime and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -e
            if command -v yum >/dev/null 2>&1; then
              yum install -y fontconfig dejavu-sans-fonts
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y fontconfig fonts-dejavu-core
            fi
            fc-cache -f || true
            systemctl restart kejijava || systemctl restart ruoyi || true
            sleep 5
            systemctl --no-pager --full status kejijava || systemctl --no-pager --full status ruoyi || true
