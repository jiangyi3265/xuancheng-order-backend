name: Fix server runtime

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Install font runtime and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -e
            if command -v yum >/dev/null 2>&1; then
              yum install -y fontconfig dejavu-sans-fonts dejavu-serif-fonts libXrender libXext
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y fontconfig fonts-dejavu-core libxrender1 libxext6
            fi
            fc-cache -f || true
            JAVA_BIN="$(find /usr/lib/jvm -path '*17*/bin/java' -type f | head -n 1)"
            if [ -z "$JAVA_BIN" ]; then
              JAVA_BIN="$(command -v java)"
            fi
            cat > /etc/systemd/system/kejijava.service <<SERVICE
            [Unit]
            Description=Xuancheng Order Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/www/wwwroot/kejijava
            ExecStart=$JAVA_BIN -Djava.awt.headless=true -jar /www/wwwroot/kejijava/ruoyi-admin.jar
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICE
            systemctl daemon-reload
            if command -v mysql >/dev/null 2>&1; then
              for MYSQL_PWD_VALUE in '123456' '${{ secrets.SERVER_PASSWORD }}' ''; do
                if MYSQL_PWD="$MYSQL_PWD_VALUE" mysql -uroot -D xc_jiedan -e "update sys_config set config_value='false' where config_key='sys.account.captchaEnabled';" >/dev/null 2>&1; then
                  echo "captcha disabled in sys_config"
                  break
                fi
              done
            fi
            systemctl restart kejijava || systemctl restart ruoyi || true
            sleep 5
            systemctl --no-pager --full status kejijava || systemctl --no-pager --full status ruoyi || true
