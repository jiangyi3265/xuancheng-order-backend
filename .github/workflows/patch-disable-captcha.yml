name: Patch disable captcha

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build patched artifacts
        run: |
          mvn -B -pl ruoyi-admin -am package -DskipTests
          mkdir -p patch/BOOT-INF/lib
          mkdir -p patch/BOOT-INF/classes/com/ruoyi/web/controller/common
          cp ruoyi-system/target/ruoyi-system-3.9.1.jar patch/BOOT-INF/lib/
          cp ruoyi-framework/target/ruoyi-framework-3.9.1.jar patch/BOOT-INF/lib/
          cp ruoyi-admin/target/classes/com/ruoyi/web/controller/common/CaptchaController.class patch/BOOT-INF/classes/com/ruoyi/web/controller/common/

      - name: Upload patched artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: patch/BOOT-INF/lib/ruoyi-system-3.9.1.jar,patch/BOOT-INF/lib/ruoyi-framework-3.9.1.jar,patch/BOOT-INF/classes/com/ruoyi/web/controller/common/CaptchaController.class
          target: /tmp/captcha-patch
          strip_components: 1
          overwrite: true

      - name: Patch server jar and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 5m
          script: |
            set -e
            python3 - <<'PY'
            import os
            import shutil
            import zipfile

            app = '/www/wwwroot/kejijava/ruoyi-admin.jar'
            tmp = app + '.patched'
            replacements = {
                'BOOT-INF/lib/ruoyi-system-3.9.1.jar': '/tmp/captcha-patch/BOOT-INF/lib/ruoyi-system-3.9.1.jar',
                'BOOT-INF/lib/ruoyi-framework-3.9.1.jar': '/tmp/captcha-patch/BOOT-INF/lib/ruoyi-framework-3.9.1.jar',
                'BOOT-INF/classes/com/ruoyi/web/controller/common/CaptchaController.class': '/tmp/captcha-patch/BOOT-INF/classes/com/ruoyi/web/controller/common/CaptchaController.class',
            }

            for replacement in replacements.values():
                if not os.path.exists(replacement):
                    raise SystemExit(f'missing replacement: {replacement}')

            with zipfile.ZipFile(app, 'r') as zin, zipfile.ZipFile(tmp, 'w', compression=zipfile.ZIP_DEFLATED) as zout:
                replaced = set()
                for item in zin.infolist():
                    if item.filename in replacements:
                        zout.write(replacements[item.filename], item.filename)
                        replaced.add(item.filename)
                    else:
                        zout.writestr(item, zin.read(item.filename))
                for entry, replacement in replacements.items():
                    if entry not in replaced:
                        zout.write(replacement, entry)

            shutil.copy2(app, app + '.bak')
            os.replace(tmp, app)
            PY
            rm -rf /tmp/captcha-patch
            systemctl restart kejijava
            sleep 10
            systemctl is-active --quiet kejijava
