name: Patch disable captcha

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build patched class
        run: |
          mvn -B -pl ruoyi-system -am package -DskipTests
          mkdir -p patch/BOOT-INF/lib
          cp ruoyi-system/target/ruoyi-system-3.9.1.jar patch/BOOT-INF/lib/

      - name: Upload patched jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: patch/BOOT-INF/lib/ruoyi-system-3.9.1.jar
          target: /tmp/captcha-patch
          strip_components: 1
          overwrite: true

      - name: Patch server jar and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 5m
          script: |
            set -e
            python3 - <<'PY'
            import os
            import shutil
            import zipfile

            app = '/www/wwwroot/kejijava/ruoyi-admin.jar'
            tmp = app + '.patched'
            entry = 'BOOT-INF/lib/ruoyi-system-3.9.1.jar'
            replacement = '/tmp/captcha-patch/' + entry

            if not os.path.exists(replacement):
                raise SystemExit(f'missing replacement: {replacement}')

            with zipfile.ZipFile(app, 'r') as zin, zipfile.ZipFile(tmp, 'w', compression=zipfile.ZIP_DEFLATED) as zout:
                replaced = False
                for item in zin.infolist():
                    if item.filename == entry:
                        zout.write(replacement, entry)
                        replaced = True
                    else:
                        zout.writestr(item, zin.read(item.filename))
                if not replaced:
                    zout.write(replacement, entry)

            shutil.copy2(app, app + '.bak')
            os.replace(tmp, app)
            PY
            rm -rf /tmp/captcha-patch
            systemctl restart kejijava
            sleep 10
            systemctl is-active --quiet kejijava
