name: Patch disable captcha

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build patched class
        run: |
          mvn -B -pl ruoyi-system -am package -DskipTests
          mkdir -p patch/BOOT-INF/classes/com/ruoyi/system/service/impl
          cp ruoyi-system/target/classes/com/ruoyi/system/service/impl/SysConfigServiceImpl.class patch/BOOT-INF/classes/com/ruoyi/system/service/impl/

      - name: Upload patched class
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: patch/BOOT-INF/classes/com/ruoyi/system/service/impl/SysConfigServiceImpl.class
          target: /tmp/captcha-patch
          strip_components: 1
          overwrite: true

      - name: Patch server jar and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 5m
          script: |
            set -e
            cd /tmp/captcha-patch
            if command -v jar >/dev/null 2>&1; then
              jar uf /www/wwwroot/kejijava/ruoyi-admin.jar BOOT-INF/classes/com/ruoyi/system/service/impl/SysConfigServiceImpl.class
            else
              zip -u /www/wwwroot/kejijava/ruoyi-admin.jar BOOT-INF/classes/com/ruoyi/system/service/impl/SysConfigServiceImpl.class
            fi
            rm -rf /tmp/captcha-patch
            systemctl restart kejijava
            sleep 5
            systemctl is-active --quiet kejijava
